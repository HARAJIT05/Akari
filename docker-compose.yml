services:

  # ── Bot ──────────────────────────────────────────────────────
  akari:
    build:
      context: .
      target: bot
    container_name: akari
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
    depends_on:
      - aria2
    networks:
      - akari-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Web Dashboard ─────────────────────────────────────────────
  akari-dashboard:
    build:
      context: .
      target: dashboard
    container_name: akari-dashboard
    restart: unless-stopped
    environment:
      - HOST_DOWNLOAD_DIR=/home/kazuha/Downloads
      - DISPLAY=${DISPLAY:-:0}
    ports:
      - "5000:5000"                             # ← http://localhost:5000
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
      - /tmp/.X11-unix:/tmp/.X11-unix           # X11 socket for xdg-open
    depends_on:
      - aria2
    networks:
      - akari-net

  # ── aria2c Download Daemon ────────────────────────────────────
  aria2:
    image: p3terx/aria2-pro:latest
    container_name: aria2
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - RPC_SECRET=akarisecret          # Change this if you want
      - DOWNLOAD_DIR=/downloads
      - DISK_CACHE=64M
      - IPV6_MODE=false
      - UPDATE_TRACKERS=true
      - CUSTOM_TRACKER_URL=
      - LISTEN_PORT=6888
      - DHT_LISTEN_PORT=6888
    volumes:
      - /home/kazuha/Videos:/downloads   # ← Downloaded anime files land here
      - ./data/aria2-config:/config        # aria2c settings persistence
    ports:
      - "6800:6800"                        # aria2c JSON-RPC port
      - "6888:6888"                        # BitTorrent listen port
      - "6888:6888/udp"                    # BitTorrent UDP
    networks:
      - akari-net

networks:
  akari-net:
    driver: bridge
